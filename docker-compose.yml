services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: kendall_supervisor
      POSTGRES_USER: kendall
      POSTGRES_PASSWORD: kendall
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kendall -d kendall_supervisor"]
      interval: 5s
      timeout: 5s
      retries: 12
  supervisor:
    build:
      context: .
      dockerfile: services/supervisor/Dockerfile
    environment:
      SUPERVISOR_DATABASE_URL: postgresql+asyncpg://kendall:kendall@postgres:5432/kendall_supervisor
      SUPERVISOR_POLL_INTERVAL_SECONDS: 5
      SUPERVISOR_ENABLE_BACKGROUND: "true"
      SUPERVISOR_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://192.168.1.53:3000,http://100.108.62.28:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      SUPERVISOR_INTERNAL_URL: http://supervisor:8000
    depends_on:
      supervisor:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:
