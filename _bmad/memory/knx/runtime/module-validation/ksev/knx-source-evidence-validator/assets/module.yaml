code: ksev
name: "KNX Source Evidence Validator"
description: "Optional KendallAI vNext pack for dependency-free validation of synthetic source/evidence fixture packs."
module_version: 1.0.0
default_selected: false
module_greeting: >
  KNX Source Evidence Validator is configured. Use it to validate synthetic
  source/evidence fixture packs and write local reports under approved KNX
  runtime storage.
ksev_fixture_pack:
  prompt: "Which synthetic KNX fixture pack should be validated by default?"
  default: "{project-root}/_bmad/memory/knx/fixtures/synthetic/first-fixture-pack.json"
  user_setting: true
ksev_report_dir:
  prompt: "Where should validator reports be written?"
  default: "{project-root}/_bmad/memory/knx/runtime/optional-source-evidence-validator/reports"
  user_setting: true
directories:
  - "{ksev_report_dir}"
post-install-notes: >
  This optional pack validates synthetic evidence only. It does not create
  source inventories, mutate source, contact remotes, or extend the KNX
  governance core.
