code: knx
name: "KendallAI vNext"
description: "Reusable BMad module strategy for a local-first, source-packet-first assistant that preserves safety, evidence, draft-only behavior, and Builder-ready workflows."
module_version: 1.0.0
default_selected: false
module_greeting: >
  KendallAI vNext is configured. Start with knx-profile-setup if no install
  profile exists, then continue through execution policy, data boundaries,
  mature-tool review, source/evidence contract, safety validation, module
  strategy, and governance coordination as needed.
agents:
  - code: governance-coordinator
    name: "Governance Coordinator"
    title: "KendallAI vNext Governance Coordinator"
    icon: "compass"
    description: "Coordinates KendallAI vNext governance routing, tradeoff explanation, and decision continuity."
knx_user_label:
  prompt: "What should this install call the primary user or owner?"
  default: "{user_name}"
  result: "Primary user: {value}"
  user_setting: true
knx_storage_mode:
  prompt: "Where should live assistant state and generated user-facing artifacts live?"
  default: "local-folder"
  user_setting: true
knx_storage_root:
  prompt: "What local or synced folder should be used for durable live state if applicable?"
  default: ""
  user_setting: true
knx_repo_remote:
  prompt: "What GitHub or Git remote stores source/review work? Leave blank if none."
  default: ""
  user_setting: true
knx_local_compute_policy:
  prompt: "Should the assistant prefer local deterministic processing and local models before external providers?"
  default: "local-first"
  user_setting: true
knx_external_llm_policy:
  prompt: "When may external LLM/GPT providers be used?"
  default: "last-resort-with-approval-or-policy"
  user_setting: true
knx_gpu_available:
  prompt: "Is host GPU or local accelerator access available for this install?"
  default: "unknown"
  user_setting: true
knx_allowed_source_roots:
  prompt: "Which local/source roots may the assistant read?"
  default: ""
  user_setting: true
knx_forbidden_destinations:
  prompt: "Which destinations are forbidden for source or generated data?"
  default: "external-providers-without-policy, customer-systems, production-systems"
  user_setting: true
knx_approval_policy:
  prompt: "Which actions require explicit user approval?"
  default: "no-send/no-mutation/credentials/account-security/customer-production/destructive"
  user_setting: true
