name: Resolve PR Review Threads

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

jobs:
  resolve-review-threads:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null
    runs-on: ubuntu-latest

    steps:
      - name: Resolve unresolved review threads
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          APPROVAL_LABEL: ci-resolve-review-threads
        shell: bash
        run: |
          set -euo pipefail

          metadata_query='
          query($owner: String!, $repo: String!, $number: Int!) {
            repository(owner: $owner, name: $repo) {
              pullRequest(number: $number) {
                headRefOid
                labels(first: 100) {
                  nodes {
                    name
                  }
                }
              }
            }
          }'

          current_head="$(
            gh api graphql \
              -f owner="$OWNER" \
              -f repo="$REPO" \
              -F number="$PR_NUMBER" \
              -f query="$metadata_query" \
              --jq '.data.repository.pullRequest.headRefOid'
          )"

          if [ "$current_head" != "$RUN_HEAD_SHA" ]; then
            echo "Skipping PR #${PR_NUMBER}: CI head ${RUN_HEAD_SHA} does not match current head ${current_head}."
            exit 0
          fi

          approval_label_present="$(
            gh api graphql \
              -f owner="$OWNER" \
              -f repo="$REPO" \
              -F number="$PR_NUMBER" \
              -f query="$metadata_query" \
              --jq '.data.repository.pullRequest.labels.nodes | map(.name) | index("ci-resolve-review-threads") != null'
          )"

          if [ "$approval_label_present" != "true" ]; then
            echo "Skipping PR #${PR_NUMBER}: add label ${APPROVAL_LABEL} after confirming review comments were addressed."
            exit 0
          fi

          query='
          query($owner: String!, $repo: String!, $number: Int!, $endCursor: String) {
            repository(owner: $owner, name: $repo) {
              pullRequest(number: $number) {
                reviewThreads(first: 100, after: $endCursor) {
                  nodes {
                    id
                    isResolved
                  }
                  pageInfo {
                    hasNextPage
                    endCursor
                  }
                }
              }
            }
          }'

          mapfile -t thread_ids < <(
            gh api graphql --paginate \
              -f owner="$OWNER" \
              -f repo="$REPO" \
              -F number="$PR_NUMBER" \
              -f query="$query" \
              --jq '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .id'
          )

          if [ "${#thread_ids[@]}" -eq 0 ]; then
            echo "No unresolved review threads found for PR #${PR_NUMBER}."
            exit 0
          fi

          mutation='
          mutation($threadId: ID!) {
            resolveReviewThread(input: {threadId: $threadId}) {
              thread {
                id
                isResolved
              }
            }
          }'

          for thread_id in "${thread_ids[@]}"; do
            echo "Resolving review thread ${thread_id} on PR #${PR_NUMBER}."
            gh api graphql \
              -f threadId="$thread_id" \
              -f query="$mutation" \
              --jq '.data.resolveReviewThread.thread | "\(.id) resolved=\(.isResolved)"'
          done
